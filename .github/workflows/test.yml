name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  repository_dispatch:
    types: [core-compat-check]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Clone victor framework — uses dispatched ref when available, else develop
          VICTOR_REF="${{ github.event.client_payload.victor_ref || 'develop' }}"
          echo "Using victor ref: $VICTOR_REF"
          git clone https://github.com/vjsingh1984/victor.git /tmp/victor-framework
          cd /tmp/victor-framework && git checkout "$VICTOR_REF" && cd -
          pip install -e /tmp/victor-framework
          # Install victor-sdk (part of victor-ai monorepo, needed for tests)
          pip install -e /tmp/victor-framework/victor-sdk
          # Now install the vertical (victor-ai already satisfies dependency)
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -n auto --dist loadscope

      - name: Check coverage
        run: |
          pytest tests/ --cov=victor_devops --cov-report=term-missing
